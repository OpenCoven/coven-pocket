name: CovenPocket
options:
  bundleIdPrefix: ai.opencoven
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    # Rust core ships arm64 slices only (device + Apple Silicon simulator).
    "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64
targets:
  CovenPocket:
    type: application
    platform: iOS
    sources:
      - path: app/Sources
      - path: app/Sources/Generated
        optional: true
      - path: app/Resources
    dependencies:
      - framework: build/CovenPocketCore.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.opencoven.pocket
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        SWIFT_STRICT_CONCURRENCY: minimal
        # libgit2 (vendored in the Rust core) expects system zlib and iconv.
        OTHER_LDFLAGS: "$(inherited) -lz -liconv"
    preBuildScripts:
      - name: Guard generated bindings
        script: |
          if [ ! -d "$SRCROOT/build/CovenPocketCore.xcframework" ]; then
            echo "error: build/CovenPocketCore.xcframework missing — run ./scripts/build-xcframework.sh first"
            exit 1
          fi
        basedOnDependencyAnalysis: false
  CovenPocketTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: app/Tests
    dependencies:
      - target: CovenPocket
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
schemes:
  CovenPocket:
    build:
      targets:
        CovenPocket: all
    test:
      targets:
        - CovenPocketTests
